version: "3.9"

services:
  api:
    build: .
    container_name: devops-demo-api
    restart: unless-stopped
    environment:
      - PORT=3000
      - APP_VERSION=${APP_VERSION:-dev}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: devops-demo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
